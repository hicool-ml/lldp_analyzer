name: Build LLDP Analyzer

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      shell: bash
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0 Pillow

    - name: Build GUI
      shell: bash
      run: |
        pyinstaller LLDP_GUI.spec --distpath dist/win

    - name: Build CLI
      shell: bash
      run: |
        pyinstaller LLDP_CLI.spec --distpath dist/win

    - name: List dist directory
      shell: bash
      run: |
        find dist -type f

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lldp-win
        path: dist/win/
        retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tcpdump libpcap-dev

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0 Pillow

    - name: Build GUI
      run: |
        pyinstaller LLDP_GUI.spec --distpath dist/linux

    - name: Build CLI
      run: |
        pyinstaller LLDP_CLI.spec --distpath dist/linux

    - name: List dist directory
      run: |
        find dist -type f

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lldp-linux
        path: dist/linux/
        retention-days: 7

  build-macos-x64:
    runs-on: macos-13
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install system dependencies
      run: |
        brew install libpcap || true

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0 Pillow

    - name: Build GUI
      run: |
        pyinstaller LLDP_GUI.spec --distpath dist/macos-x64

    - name: Build CLI
      run: |
        pyinstaller LLDP_CLI.spec --distpath dist/macos-x64

    - name: List dist directory
      run: |
        find dist -type f

    - name: Codesign and remove quarantine
      run: |
        codesign --force --deep --sign - dist/macos-x64/LLDP_GUI.app || true
        codesign --force --sign - dist/macos-x64/LLDP_CLI/LLDP_CLI || true
        xattr -cr dist/macos-x64/LLDP_GUI.app || true
        xattr -cr dist/macos-x64/LLDP_CLI || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lldp-macos-x64
        path: dist/macos-x64/
        retention-days: 7

  build-macos-arm64:
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install system dependencies
      run: |
        brew install libpcap || true

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0 Pillow

    - name: Build GUI
      run: |
        pyinstaller LLDP_GUI.spec --distpath dist/macos-arm64

    - name: Build CLI
      run: |
        pyinstaller LLDP_CLI.spec --distpath dist/macos-arm64

    - name: List dist directory
      run: |
        find dist -type f

    - name: Codesign and remove quarantine
      run: |
        codesign --force --deep --sign - dist/macos-arm64/LLDP_GUI.app || true
        codesign --force --sign - dist/macos-arm64/LLDP_CLI/LLDP_CLI || true
        xattr -cr dist/macos-arm64/LLDP_GUI.app || true
        xattr -cr dist/macos-arm64/LLDP_CLI || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lldp-macos-arm64
        path: dist/macos-arm64/
        retention-days: 7

  release:
    needs: [build-win, build-linux, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-win
          path: artifacts/win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-linux
          path: artifacts/linux

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-macos-x64
          path: artifacts/macos-x64

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-macos-arm64
          path: artifacts/macos-arm64

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Zip Windows GUI
        run: |
          cd artifacts/win
          zip -r LLDP_GUI_Windows.zip LLDP_GUI

      - name: Zip Windows CLI
        run: |
          cd artifacts/win
          zip -r LLDP_CLI_Windows.zip LLDP_CLI

      - name: Zip Linux GUI
        run: |
          cd artifacts/linux
          zip -r LLDP_GUI_Linux.zip LLDP_GUI

      - name: Zip Linux CLI
        run: |
          cd artifacts/linux
          zip -r LLDP_CLI_Linux.zip LLDP_CLI

      - name: Zip macOS x64 GUI
        run: |
          cd artifacts/macos-x64
          zip -r LLDP_GUI_macOS_x64.zip LLDP_GUI.app

      - name: Zip macOS x64 CLI
        run: |
          cd artifacts/macos-x64
          zip -r LLDP_CLI_macOS_x64.zip LLDP_CLI

      - name: Zip macOS arm64 GUI
        run: |
          cd artifacts/macos-arm64
          zip -r LLDP_GUI_macOS_arm64.zip LLDP_GUI.app

      - name: Zip macOS arm64 CLI
        run: |
          cd artifacts/macos-arm64
          zip -r LLDP_CLI_macOS_arm64.zip LLDP_CLI

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0
          name: LLDP Analyzer v2.0.0
          body: |
            ## Release Notes - v2.0.0

            ### New Features
            - Complete macOS support with dedicated network backend
            - Full cross-platform support (Windows, macOS, Linux)
            - MAC address spoofing support on macOS
            - Static IP / DHCP configuration on macOS
            - Enhanced privilege escalation handling

            ### Bug Fixes
            - Fixed LLDP packet capture timeout issue (5s wait for dual protocol CDP+LLDP)
            - Fixed macOS AttributeError with hardcoded Windows backend
            - Enhanced error handling and fallback mechanisms

            ### Downloads

            **Windows**
            - LLDP_GUI_Windows.zip - GUI version for Windows
            - LLDP_CLI_Windows.zip - CLI version for Windows

            **Linux**
            - LLDP_GUI_Linux.zip - GUI version for Linux
            - LLDP_CLI_Linux.zip - CLI version for Linux

            **macOS**
            - LLDP_GUI_macOS_x64.zip - GUI version for Intel Mac
            - LLDP_CLI_macOS_x64.zip - CLI version for Intel Mac
            - LLDP_GUI_macOS_arm64.zip - GUI version for Apple Silicon
            - LLDP_CLI_macOS_arm64.zip - CLI version for Apple Silicon
          draft: false
          prerelease: false
          files: |
            artifacts/win/LLDP_GUI_Windows.zip
            artifacts/win/LLDP_CLI_Windows.zip
            artifacts/linux/LLDP_GUI_Linux.zip
            artifacts/linux/LLDP_CLI_Linux.zip
            artifacts/macos-x64/LLDP_GUI_macOS_x64.zip
            artifacts/macos-x64/LLDP_CLI_macOS_x64.zip
            artifacts/macos-arm64/LLDP_GUI_macOS_arm64.zip
            artifacts/macos-arm64/LLDP_CLI_macOS_arm64.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
