name: Build LLDP Analyzer

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            platform: win
          - os: ubuntu-latest
            arch: x64
            platform: linux
          - os: macos-latest
            arch: arm64
            platform: macos

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        architecture: ${{ matrix.arch }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0

    - name: Install system dependencies (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y tcpdump libpcap-dev

    - name: Install system dependencies (macOS)
      if: matrix.platform == 'macos'
      run: |
        brew install libpcap

    - name: Build GUI
      run: |
        pyinstaller LLDP_GUI.spec --distpath dist/${{ matrix.platform }}_${{ matrix.arch }}

    - name: Build CLI
      run: |
        pyinstaller LLDP_CLI.spec --distpath dist/${{ matrix.platform }}_${{ matrix.arch }}

    - name: List dist directory
      run: |
        python -c "import os; [print(os.path.join(root, f)) for root, _, files in os.walk('dist') for f in files]"

    - name: Rename artifacts (Windows)
      if: matrix.platform == 'win'
      shell: powershell
      run: |
        cd dist/${{ matrix.platform }}_${{ matrix.arch }}
        if (Test-Path "LLDP_GUI.exe") { Rename-Item "LLDP_GUI.exe" "LLDP_GUI_win_${{ matrix.arch }}.exe" -Force }
        if (Test-Path "LLDP_CLI.exe") { Rename-Item "LLDP_CLI.exe" "LLDP_CLI_win_${{ matrix.arch }}.exe" -Force }

    - name: Rename artifacts (Linux)
      if: matrix.platform == 'linux'
      run: |
        cd dist/${{ matrix.platform }}_${{ matrix.arch }}
        if [ -f "LLDP_GUI" ]; then mv LLDP_GUI LLDP_GUI_linux_${{ matrix.arch }}; fi
        if [ -f "LLDP_CLI" ]; then mv LLDP_CLI LLDP_CLI_linux_${{ matrix.arch }}; fi

    - name: Rename artifacts (macOS)
      if: matrix.platform == 'macos'
      run: |
        cd dist/${{ matrix.platform }}_${{ matrix.arch }}
        if [ -d "LLDP_GUI.app" ]; then mv LLDP_GUI.app LLDP_GUI_macos_${{ matrix.arch }}.app; fi
        if [ -f "LLDP_CLI" ]; then mv LLDP_CLI LLDP_CLI_macos_${{ matrix.arch }}; fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lldp-${{ matrix.platform }}-${{ matrix.arch }}
        path: dist/${{ matrix.platform }}_${{ matrix.arch }}/
        retention-days: 7

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/tags/v*'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lldp-*
          path: artifacts/

      - name: Display structure of downloaded files
        run: find artifacts -type f

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: |
            artifacts/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
