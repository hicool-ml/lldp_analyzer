name: Build LLDP Analyzer

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
            target_arch: x86_64
          - os: macos-latest
            platform: macos
            target_arch: arm64
          - os: macos-latest
            platform: macos
            target_arch: universal2

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0 Pillow

    - name: Install system dependencies (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y tcpdump libpcap-dev

    - name: Install system dependencies (macOS)
      if: matrix.platform == 'macos'
      run: |
        brew install libpcap || true

    - name: Build GUI
      run: |
        if [ "${{ matrix.platform }}" = "macos" ]; then
          pyinstaller LLDP_GUI.spec --distpath dist/${{ matrix.platform }}_${{ matrix.target_arch }} --target-arch ${{ matrix.target_arch }}
        else
          pyinstaller LLDP_GUI.spec --distpath dist/${{ matrix.platform }}
        fi

    - name: Build CLI
      run: |
        if [ "${{ matrix.platform }}" = "macos" ]; then
          pyinstaller LLDP_CLI.spec --distpath dist/${{ matrix.platform }}_${{ matrix.target_arch }} --target-arch ${{ matrix.target_arch }}
        else
          pyinstaller LLDP_CLI.spec --distpath dist/${{ matrix.platform }}
        fi

    - name: Codesign and remove quarantine (macOS)
      if: matrix.platform == 'macos'
      run: |
        codesign --force --deep --sign - dist/${{ matrix.platform }}_${{ matrix.target_arch }}/LLDP_GUI.app
        codesign --force --sign - dist/${{ matrix.platform }}_${{ matrix.target_arch }}/LLDP_CLI/LLDP_CLI
        xattr -cr dist/${{ matrix.platform }}_${{ matrix.target_arch }}/LLDP_GUI.app
        xattr -cr dist/${{ matrix.platform }}_${{ matrix.target_arch }}/LLDP_CLI

    - name: List dist directory (Windows)
      if: matrix.platform == 'win'
      shell: powershell
      run: |
        Get-ChildItem -Recurse dist

    - name: List dist directory (Unix)
      if: matrix.platform != 'win'
      run: |
        find dist -type f

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lldp-${{ matrix.platform }}${{ '-'+matrix.target_arch if matrix.platform == 'macos' else '' }}
        path: dist/${{ matrix.platform }}${{ '_'+matrix.target_arch if matrix.platform == 'macos' else '' }}/
        retention-days: 7

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-win
          path: artifacts/win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-linux
          path: artifacts/linux

      - name: Download macOS x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-macos-x86_64
          path: artifacts/macos-x86_64

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-macos-arm64
          path: artifacts/macos-arm64

      - name: Download macOS universal2 artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-macos-universal2
          path: artifacts/macos-universal2

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Zip Windows GUI
        run: |
          cd artifacts/win
          zip -r LLDP_GUI_Windows.zip LLDP_GUI

      - name: Zip Windows CLI
        run: |
          cd artifacts/win
          zip -r LLDP_CLI_Windows.zip LLDP_CLI

      - name: Zip Linux GUI
        run: |
          cd artifacts/linux
          zip -r LLDP_GUI_Linux.zip LLDP_GUI

      - name: Zip Linux CLI
        run: |
          cd artifacts/linux
          zip -r LLDP_CLI_Linux.zip LLDP_CLI

      - name: Zip macOS x86_64 GUI
        run: |
          cd artifacts/macos-x86_64
          zip -r LLDP_GUI_macOS_x86_64.zip LLDP_GUI.app

      - name: Zip macOS x86_64 CLI
        run: |
          cd artifacts/macos-x86_64
          zip -r LLDP_CLI_macOS_x86_64.zip LLDP_CLI

      - name: Zip macOS arm64 GUI
        run: |
          cd artifacts/macos-arm64
          zip -r LLDP_GUI_macOS_arm64.zip LLDP_GUI.app

      - name: Zip macOS arm64 CLI
        run: |
          cd artifacts/macos-arm64
          zip -r LLDP_CLI_macOS_arm64.zip LLDP_CLI

      - name: Zip macOS universal2 GUI
        run: |
          cd artifacts/macos-universal2
          zip -r LLDP_GUI_macOS_universal2.zip LLDP_GUI.app

      - name: Zip macOS universal2 CLI
        run: |
          cd artifacts/macos-universal2
          zip -r LLDP_CLI_macOS_universal2.zip LLDP_CLI

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0
          name: LLDP Analyzer v2.0.0
          body: |
            ## Release Notes - v2.0.0

            ### New Features
            - Complete macOS support with dedicated network backend
            - Full cross-platform support (Windows, macOS, Linux)
            - MAC address spoofing support on macOS
            - Static IP / DHCP configuration on macOS
            - Enhanced privilege escalation handling

            ### Bug Fixes
            - Fixed LLDP packet capture timeout issue (5s wait for dual protocol CDP+LLDP)
            - Fixed macOS AttributeError with hardcoded Windows backend
            - Enhanced error handling and fallback mechanisms

            ### Downloads

            **Windows**
            - LLDP_GUI_Windows.zip - GUI version for Windows
            - LLDP_CLI_Windows.zip - CLI version for Windows

            **Linux**
            - LLDP_GUI_Linux.zip - GUI version for Linux
            - LLDP_CLI_Linux.zip - CLI version for Linux

            **macOS**
            - LLDP_GUI_macOS_x86_64.zip - GUI version for Intel Mac
            - LLDP_CLI_macOS_x86_64.zip - CLI version for Intel Mac
            - LLDP_GUI_macOS_arm64.zip - GUI version for Apple Silicon
            - LLDP_CLI_macOS_arm64.zip - CLI version for Apple Silicon
            - LLDP_GUI_macOS_universal2.zip - GUI version for both architectures
            - LLDP_CLI_macOS_universal2.zip - CLI version for both architectures
          draft: false
          prerelease: false
          files: |
            artifacts/win/LLDP_GUI_Windows.zip
            artifacts/win/LLDP_CLI_Windows.zip
            artifacts/linux/LLDP_GUI_Linux.zip
            artifacts/linux/LLDP_CLI_Linux.zip
            artifacts/macos-x86_64/LLDP_GUI_macOS_x86_64.zip
            artifacts/macos-x86_64/LLDP_CLI_macOS_x86_64.zip
            artifacts/macos-arm64/LLDP_GUI_macOS_arm64.zip
            artifacts/macos-arm64/LLDP_CLI_macOS_arm64.zip
            artifacts/macos-universal2/LLDP_GUI_macOS_universal2.zip
            artifacts/macos-universal2/LLDP_CLI_macOS_universal2.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
