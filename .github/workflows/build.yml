name: Build LLDP Analyzer

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0 Pillow

    - name: Install system dependencies (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y tcpdump libpcap-dev

    - name: Install system dependencies (macOS)
      if: matrix.platform == 'macos'
      run: |
        brew install libpcap || true

    - name: Build GUI
      run: |
        pyinstaller LLDP_GUI.spec --distpath dist/${{ matrix.platform }}

    - name: Build CLI
      run: |
        pyinstaller LLDP_CLI.spec --distpath dist/${{ matrix.platform }}

    - name: List dist directory (Windows)
      if: matrix.platform == 'win'
      shell: powershell
      run: |
        Get-ChildItem -Recurse dist

    - name: List dist directory (Unix)
      if: matrix.platform != 'win'
      run: |
        find dist -type f

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lldp-${{ matrix.platform }}
        path: dist/${{ matrix.platform }}/
        retention-days: 7

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-win
          path: artifacts/win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-linux
          path: artifacts/linux

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-macos
          path: artifacts/macos

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0
          name: LLDP Analyzer v2.0.0
          body: |
            ## Release Notes - v2.0.0

            ### New Features
            - Complete macOS support with dedicated network backend
            - Full cross-platform support (Windows, macOS, Linux)
            - MAC address spoofing support on macOS
            - Static IP / DHCP configuration on macOS
            - Enhanced privilege escalation handling

            ### Bug Fixes
            - Fixed LLDP packet capture timeout issue (5s wait for dual protocol CDP+LLDP)
            - Fixed macOS AttributeError with hardcoded Windows backend
            - Enhanced error handling and fallback mechanisms

            ### Downloads

            **Windows**
            - LLDP_GUI.exe - GUI version for Windows
            - LLDP_CLI.exe - CLI version for Windows

            **Linux**
            - LLDP_GUI - GUI version for Linux
            - LLDP_CLI - CLI version for Linux

            **macOS**
            - LLDP_GUI.app - GUI version for macOS
            - LLDP_CLI - CLI version for macOS
          draft: false
          prerelease: false
          files: |
            artifacts/win/LLDP_GUI/LLDP_GUI.exe
            artifacts/win/LLDP_CLI/LLDP_CLI.exe
            artifacts/linux/LLDP_GUI/LLDP_GUI
            artifacts/linux/LLDP_CLI/LLDP_CLI
            artifacts/macos/LLDP_GUI.app/**/*
            artifacts/macos/LLDP_CLI/LLDP_CLI
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
