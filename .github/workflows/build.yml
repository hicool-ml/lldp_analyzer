name: Build LLDP Analyzer

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      shell: bash
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0 Pillow

    - name: Build GUI
      shell: bash
      run: |
        pyinstaller LLDP_GUI.spec --distpath dist/win

    - name: Build CLI
      shell: bash
      run: |
        pyinstaller LLDP_CLI.spec --distpath dist/win

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lldp-win
        path: dist/win/
        retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tcpdump libpcap-dev

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0 Pillow

    - name: Build GUI
      run: |
        pyinstaller LLDP_GUI.spec --distpath dist/linux

    - name: Build CLI
      run: |
        pyinstaller LLDP_CLI.spec --distpath dist/linux

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lldp-linux
        path: dist/linux/
        retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install system dependencies
      run: |
        brew install libpcap || true

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0 Pillow

    - name: Generate icns icon
      run: |
        mkdir -p tmp.iconset
        sips -z 16 16 lldp_icon.png --out tmp.iconset/icon_16x16.png
        sips -z 32 32 lldp_icon.png --out tmp.iconset/icon_16x16@2x.png
        sips -z 32 32 lldp_icon.png --out tmp.iconset/icon_32x32.png
        sips -z 64 64 lldp_icon.png --out tmp.iconset/icon_32x32@2x.png
        sips -z 128 128 lldp_icon.png --out tmp.iconset/icon_128x128.png
        sips -z 256 256 lldp_icon.png --out tmp.iconset/icon_128x128@2x.png
        sips -z 256 256 lldp_icon.png --out tmp.iconset/icon_256x256.png
        sips -z 512 512 lldp_icon.png --out tmp.iconset/icon_256x256@2x.png
        sips -z 512 512 lldp_icon.png --out tmp.iconset/icon_512x512.png
        iconutil -c icns tmp.iconset -o lldp_icon.icns
        rm -rf tmp.iconset

    - name: Build GUI
      run: |
        pyinstaller LLDP_GUI.spec --distpath dist/macos

    - name: Build CLI
      run: |
        pyinstaller LLDP_CLI.spec --distpath dist/macos

    - name: "Debug: Show app bundle structure"
      run: |
        echo "=== App bundle structure ==="
        find dist/macos/LLDP_GUI.app -type f | head -50
        echo ""
        echo "=== MacOS directory ==="
        ls -la dist/macos/LLDP_GUI.app/Contents/MacOS/ || echo "MacOS dir not found"
        echo ""
        echo "=== Resources directory ==="
        ls -la dist/macos/LLDP_GUI.app/Contents/Resources/ || echo "Resources dir not found"
        echo ""
        echo "=== Frameworks directory ==="
        ls dist/macos/LLDP_GUI.app/Contents/Frameworks/ | head -20
        echo ""
        echo "=== Info.plist ==="
        cat dist/macos/LLDP_GUI.app/Contents/Info.plist

    - name: Fix app bundle structure
      run: |
        APP="dist/macos/LLDP_GUI.app"
        echo "=== Checking app bundle structure ==="
        
        if [ ! -d "$APP/Contents/MacOS" ]; then
          echo "Creating Contents/MacOS directory..."
          mkdir -p "$APP/Contents/MacOS"
        fi
        
        if [ ! -f "$APP/Contents/MacOS/LLDP_GUI" ]; then
          echo "LLDP_GUI not found in MacOS, searching..."
          if [ -f "dist/macos/LLDP_GUI/LLDP_GUI" ]; then
            echo "Found in dist/macos/LLDP_GUI/, copying..."
            cp -R dist/macos/LLDP_GUI/* "$APP/Contents/MacOS/"
          elif [ -f "$APP/Contents/LLDP_GUI" ]; then
            echo "Found in Contents/, moving to MacOS..."
            mv "$APP/Contents/LLDP_GUI" "$APP/Contents/MacOS/"
            mv "$APP/Contents/"*.dylib "$APP/Contents/MacOS/" 2>/dev/null || true
          fi
        fi
        
        echo "=== Setting executable permissions ==="
        if [ -f "$APP/Contents/MacOS/LLDP_GUI" ]; then
          chmod +x "$APP/Contents/MacOS/LLDP_GUI"
          ls -la "$APP/Contents/MacOS/LLDP_GUI"
        else
          echo "WARNING: LLDP_GUI executable not found!"
          find "$APP" -name "LLDP_GUI" -type f
        fi
        
        if [ -f "dist/macos/LLDP_CLI/LLDP_CLI" ]; then
          chmod +x "dist/macos/LLDP_CLI/LLDP_CLI"
        fi
        
        echo "=== Verifying Info.plist ==="
        plutil -p "$APP/Contents/Info.plist" 2>/dev/null || cat "$APP/Contents/Info.plist"
        
        echo "=== Checking executable architecture ==="
        if [ -f "$APP/Contents/MacOS/LLDP_GUI" ]; then
          file "$APP/Contents/MacOS/LLDP_GUI"
          otool -L "$APP/Contents/MacOS/LLDP_GUI" | head -20
        fi

    - name: Codesign and notarization prep
      run: |
        APP="dist/macos/LLDP_GUI.app"
        
        echo "=== Code signing ==="
        codesign --force --deep --sign - "$APP" 2>&1 || echo "codesign failed (non-fatal)"
        codesign --verify --deep --verbose=2 "$APP" 2>&1 || echo "codesign verify failed (non-fatal)"
        
        echo "=== Removing quarantine attributes ==="
        xattr -cr "$APP" || true
        xattr -cr "dist/macos/LLDP_CLI" || true
        
        echo "=== Final app bundle check ==="
        find "$APP" -maxdepth 3 -type f | sort
        echo ""
        echo "MacOS directory contents:"
        ls -la "$APP/Contents/MacOS/" 2>/dev/null || echo "MacOS dir not found"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lldp-macos
        path: dist/macos/
        retention-days: 7

  release:
    needs: [build-win, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-win
          path: artifacts/win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-linux
          path: artifacts/linux

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: lldp-macos
          path: artifacts/macos

      - name: Zip Windows GUI
        run: |
          cd artifacts/win
          zip -r LLDP_GUI_Windows.zip LLDP_GUI

      - name: Zip Windows CLI
        run: |
          cd artifacts/win
          zip -r LLDP_CLI_Windows.zip LLDP_CLI

      - name: Zip Linux GUI
        run: |
          cd artifacts/linux
          zip -r LLDP_GUI_Linux.zip LLDP_GUI

      - name: Zip Linux CLI
        run: |
          cd artifacts/linux
          zip -r LLDP_CLI_Linux.zip LLDP_CLI

      - name: Zip macOS GUI
        run: |
          cd artifacts/macos
          zip -r LLDP_GUI_macOS.zip LLDP_GUI.app

      - name: Zip macOS CLI
        run: |
          cd artifacts/macos
          zip -r LLDP_CLI_macOS.zip LLDP_CLI

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0
          name: LLDP Analyzer v2.0.0
          body: |
            ## Release Notes - v2.0.0

            ### New Features
            - Complete macOS support with dedicated network backend
            - Full cross-platform support (Windows, macOS, Linux)
            - MAC address spoofing support on macOS
            - Static IP / DHCP configuration on macOS
            - Enhanced privilege escalation handling

            ### Bug Fixes
            - Fixed LLDP packet capture timeout issue (5s wait for dual protocol CDP+LLDP)
            - Fixed macOS AttributeError with hardcoded Windows backend
            - Enhanced error handling and fallback mechanisms

            ### Downloads

            **Windows**
            - LLDP_GUI_Windows.zip - GUI version for Windows
            - LLDP_CLI_Windows.zip - CLI version for Windows

            **Linux**
            - LLDP_GUI_Linux.zip - GUI version for Linux
            - LLDP_CLI_Linux.zip - CLI version for Linux

            **macOS (Apple Silicon)**
            - LLDP_GUI_macOS.zip - GUI version for macOS
            - LLDP_CLI_macOS.zip - CLI version for macOS
          draft: false
          prerelease: false
          files: |
            artifacts/win/LLDP_GUI_Windows.zip
            artifacts/win/LLDP_CLI_Windows.zip
            artifacts/linux/LLDP_GUI_Linux.zip
            artifacts/linux/LLDP_CLI_Linux.zip
            artifacts/macos/LLDP_GUI_macOS.zip
            artifacts/macos/LLDP_CLI_macOS.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
