name: Build LLDP Analyzer

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0

    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y tcpdump libpcap-dev

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install libpcap

    - name: Build GUI (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller LLDP_GUI.spec --distpath dist/win

    - name: Build CLI (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller LLDP_CLI.spec --distpath dist/win

    - name: Build GUI (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller LLDP_GUI.spec --distpath dist/linux

    - name: Build CLI (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller LLDP_CLI.spec --distpath dist/linux

    - name: Build GUI (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller LLDP_GUI.spec --distpath dist/macos

    - name: Build CLI (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller LLDP_CLI.spec --distpath dist/macos

    - name: Upload Windows artifacts
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: lldp-windows
        path: dist/win/
        retention-days: 7

    - name: Upload Linux artifacts
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: lldp-linux
        path: dist/linux/
        retention-days: 7

    - name: Upload macOS artifacts
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: lldp-macos
        path: dist/macos/
        retention-days: 7
